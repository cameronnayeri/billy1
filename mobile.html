<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>William Theodosatos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            min-height: 100vh;
            background: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        body.locked { overflow: hidden; }

        header {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            padding: 28px 24px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            z-index: 100;
        }

        .artist-name {
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #111;
        }

        .email a {
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.07em;
            color: #111;
            text-decoration: none;
        }

        /* scrolls away with page */
        .header-extra {
            padding: 0 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .header-extra a {
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.07em;
            color: #111;
            text-decoration: none;
        }

        .tagline {
            font-size: 10px;
            font-weight: 400;
            color: #bbb;
            letter-spacing: 0.03em;
            line-height: 1.7;
        }

        /* gallery */
        .gallery {
            padding: 20px 0 72px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .artwork-item {
            width: 76vw;
            cursor: pointer;
            position: relative;
        }

        .artwork-item:nth-child(odd) {
            align-self: flex-start;
            margin-left: 7vw;
            transform: rotate(-1.5deg);
        }

        .artwork-item:nth-child(even) {
            align-self: flex-end;
            margin-right: 7vw;
            transform: rotate(1deg);
        }

        .artwork-item img {
            display: block;
            width: 100%;
            height: auto;
            border: 3px solid transparent;
            transition: border-color 0.15s ease;
        }

        .artwork-item.tapped img {
            border-color: #888;
            filter: drop-shadow(4px 4px 0px #888);
        }

        /* dark overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 200;
        }

        #overlay.active {
            opacity: 0.65;
            pointer-events: all;
        }

        /* modal — covers screen, clicking empty area closes */
        #modal {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            padding: 24px;
            padding-bottom: 100px; /* room for fixed nav */
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #modal.active {
            pointer-events: all;
            opacity: 1;
        }

        #modalImg {
            display: block;
            width: auto;
            height: auto;
            max-width: calc(100vw - 48px);
            max-height: 62vh;
            transform: scale(0.9);
            transition: transform 0.45s cubic-bezier(0.34, 1.18, 0.64, 1),
                        opacity 0.15s ease;
            pointer-events: none; /* let taps on image fall through to modal for closing */
        }

        #modal.active #modalImg {
            transform: scale(1);
        }

        #modalBlurb {
            margin-top: 20px;
            max-width: calc(100vw - 48px);
            font-size: 11px;
            font-weight: 400;
            line-height: 1.85;
            color: #fff;
            letter-spacing: 0.03em;
            text-align: left;
            pointer-events: none;
        }

        #modalBlurb .title {
            display: block;
            font-weight: 500;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* nav pinned to bottom, independent of image size */
        #navRow {
            position: fixed;
            bottom: 40px;
            left: 24px;
            display: flex;
            gap: 28px;
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #navRow.active {
            opacity: 1;
            pointer-events: all;
        }

        .nav-btn {
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
            cursor: pointer;
            padding: 6px 0;
            user-select: none;
            transition: color 0.15s ease;
        }

        .nav-btn:active { color: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="artist-name">William Theodosatos</div>
        <div class="email"><a href="mailto:william@theodosatos.com">william@theodosatos.com</a></div>
    </header>

    <div class="header-extra">
        <a href="https://instagram.com" target="_blank">Instagram</a>
        <div class="tagline">
            Painting and illustration.<br>
            Open for commissions and editorial.
        </div>
    </div>

    <div class="gallery" id="gallery"></div>

    <div id="overlay"></div>

    <div id="modal">
        <img id="modalImg" src="" alt="">
        <div id="modalBlurb"></div>
    </div>

    <div id="navRow">
        <span class="nav-btn" id="prevBtn">← Prev</span>
        <span class="nav-btn" id="nextBtn">Next →</span>
    </div>

    <script>
        const images = [
            'william-theodosatos-asset.jpg',
            'william-theodosatos-asset2.jpg',
            'william-theodosatos-asset3.jpg',
            'william-theodosatos-asset4.jpg',
            'william-theodosatos-asset5.jpg',
            'william-theodosatos-asset6.jpg',
        ];

        const blurbs = [
            '<span class="title">Untitled I — 2023</span>Oil on linen, 24 × 18 in.<br><br>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore.',
            '<span class="title">Untitled II — 2023</span>Gouache on paper, 16 × 12 in.<br><br>Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo.',
            '<span class="title">Untitled III — 2022</span>Oil on canvas, 30 × 24 in.<br><br>Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.',
            '<span class="title">Untitled IV — 2022</span>Acrylic on board, 20 × 16 in.<br><br>Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim.',
            '<span class="title">Untitled V — 2024</span>Oil on linen, 36 × 28 in.<br><br>Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium.',
            '<span class="title">Untitled VI — 2024</span>Ink and gouache on paper, 14 × 11 in.<br><br>Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit consequuntur magni.',
        ];

        const gallery    = document.getElementById('gallery');
        const overlay    = document.getElementById('overlay');
        const modal      = document.getElementById('modal');
        const modalImg   = document.getElementById('modalImg');
        const modalBlurb = document.getElementById('modalBlurb');
        const navRow     = document.getElementById('navRow');
        const prevBtn    = document.getElementById('prevBtn');
        const nextBtn    = document.getElementById('nextBtn');

        let currentIdx = null;

        images.forEach((src, i) => {
            const item = document.createElement('div');
            item.className = 'artwork-item';

            const img = document.createElement('img');
            img.src = src;
            img.alt = '';
            item.appendChild(img);
            gallery.appendChild(item);

            item.addEventListener('touchstart', () => item.classList.add('tapped'),   { passive: true });
            item.addEventListener('touchend',   () => item.classList.remove('tapped'), { passive: true });
            item.addEventListener('click', () => open(i));
        });

        function open(idx) {
            currentIdx = idx;
            showImage(idx);
            document.body.classList.add('locked');
            overlay.classList.add('active');
            modal.classList.add('active');
            navRow.classList.add('active');
        }

        function close() {
            currentIdx = null;
            document.body.classList.remove('locked');
            overlay.classList.remove('active');
            modal.classList.remove('active');
            navRow.classList.remove('active');
        }

        function showImage(idx) {
            modalImg.style.opacity = '0';
            setTimeout(() => {
                modalImg.src = images[idx];
                modalBlurb.innerHTML = blurbs[idx];
                modalImg.style.opacity = '1';
            }, 120);
        }

        function navigate(dir) {
            const n = images.length;
            currentIdx = (currentIdx + dir + n) % n;
            showImage(currentIdx);
        }

        // clicking the modal background (not image/blurb) closes
        modal.addEventListener('click', close);

        prevBtn.addEventListener('click', e => { e.stopPropagation(); navigate(-1); });
        nextBtn.addEventListener('click', e => { e.stopPropagation(); navigate(1); });

        // swipe to navigate
        let swipeStartX = null;
        modal.addEventListener('touchstart', e => {
            swipeStartX = e.touches[0].clientX;
        }, { passive: true });

        modal.addEventListener('touchend', e => {
            if (swipeStartX === null) return;
            const dx = e.changedTouches[0].clientX - swipeStartX;
            swipeStartX = null;
            if (Math.abs(dx) > 52) navigate(dx < 0 ? 1 : -1);
        }, { passive: true });
    </script>

</body>
</html>
