<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Theodosatos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 36px 48px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 9999;
            pointer-events: none;
        }

        .artist-name {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #111;
        }

        .contact {
            pointer-events: all;
            text-align: right;
        }

        .contact a {
            display: block;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #111;
            text-decoration: none;
            line-height: 2.1;
            transition: opacity 0.2s;
        }

        .contact a:hover { opacity: 0.35; }

        .blurb {
            position: fixed;
            bottom: 40px;
            left: 48px;
            max-width: 240px;
            font-size: 11px;
            font-weight: 400;
            line-height: 1.85;
            color: #bbb;
            letter-spacing: 0.03em;
            z-index: 9999;
            pointer-events: none;
        }

        .artwork {
            position: absolute;
            cursor: grab;
            transform-origin: center center;
            transition: transform 0.5s cubic-bezier(0.34, 1.62, 0.64, 1), filter 0.3s ease;
        }

        .artwork:active { cursor: grabbing; }

        .artwork img {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        /* unique hover states per image */
        #aw0:hover { filter: brightness(1.12) contrast(0.94); }
        #aw1:hover { filter: saturate(1.45); }
        #aw2:hover { filter: sepia(0.28) brightness(1.04); }
        #aw3:hover { filter: contrast(1.18); }
        #aw4:hover { filter: brightness(0.87) saturate(1.12); }
        #aw5:hover { filter: hue-rotate(14deg) saturate(1.2); }
    </style>
</head>
<body>

    <header>
        <div class="artist-name">William Theodosatos</div>
        <div class="contact">
            <a href="mailto:william@theodosatos.com">william@theodosatos.com</a>
            <a href="https://instagram.com" target="_blank">Instagram</a>
        </div>
    </header>

    <div class="blurb">
        Painting and illustration.<br>
        Open for commissions and editorial.
    </div>

    <script>
        const ENLARGED_W = 450; // px — consistent target width for all enlarged images

        const images = [
            'william-theodosatos-asset.jpg',
            'william-theodosatos-asset2.jpg',
            'william-theodosatos-asset3.jpg',
            'william-theodosatos-asset4.jpg',
            'william-theodosatos-asset5.jpg',
            'william-theodosatos-asset6.jpg',
        ];

        // positions clustered around center; x/y are top-left as fraction of viewport
        const configs = [
            { x: 0.28, y: 0.22, w: 230, rot: -2   },
            { x: 0.43, y: 0.14, w: 200, rot:  1.5 },
            { x: 0.55, y: 0.22, w: 250, rot: -1   },
            { x: 0.51, y: 0.47, w: 210, rot:  2.5 },
            { x: 0.29, y: 0.48, w: 215, rot: -3   },
            { x: 0.42, y: 0.36, w: 195, rot:  1   },
        ];

        let zTop = 100;

        images.forEach((src, i) => {
            const cfg = configs[i];
            const enlargedScale = ENLARGED_W / cfg.w;

            const el = document.createElement('div');
            el.className = 'artwork';
            el.id = 'aw' + i;
            el.style.width  = cfg.w + 'px';
            el.style.left   = (cfg.x * window.innerWidth)  + 'px';
            el.style.top    = (cfg.y * window.innerHeight) + 'px';
            el.style.zIndex = zTop++;
            el.style.transform = `rotate(${cfg.rot}deg) scale(1)`;
            el.dataset.rot          = cfg.rot;
            el.dataset.enlargedScale = enlargedScale;
            el.dataset.enlarged     = 'false';

            const img = document.createElement('img');
            img.src = src;
            el.appendChild(img);
            document.body.appendChild(el);

            let dragging = false, moved = false;
            let sx, sy, ox, oy;

            el.addEventListener('mousedown', e => {
                e.preventDefault();
                dragging = true;
                moved    = false;
                sx = e.clientX;
                sy = e.clientY;
                ox = parseFloat(el.style.left);
                oy = parseFloat(el.style.top);
                el.style.zIndex     = ++zTop;
                el.style.transition = 'none';
            });

            window.addEventListener('mousemove', e => {
                if (!dragging) return;
                const dx = e.clientX - sx;
                const dy = e.clientY - sy;
                if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
                el.style.left = (ox + dx) + 'px';
                el.style.top  = (oy + dy) + 'px';
            });

            window.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false;
                el.style.transition = ''; // restore CSS-defined transition
                el.getBoundingClientRect(); // flush so transform transition fires
                if (!moved) toggle(el);
            });
        });

        function toggle(el) {
            const rot   = el.dataset.rot;
            const scale = el.dataset.enlargedScale;
            if (el.dataset.enlarged === 'true') {
                el.dataset.enlarged = 'false';
                el.style.transform  = `rotate(${rot}deg) scale(1)`;
            } else {
                el.dataset.enlarged = 'true';
                el.style.zIndex     = ++zTop;
                el.style.transform  = `rotate(${rot}deg) scale(${scale})`;
            }
        }
    </script>

</body>
</html>
